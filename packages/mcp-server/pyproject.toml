[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "workpack-mcp-server"
version = "0.1.0"
description = "Read-only MCP server for Workpack Protocol — exposes workpack discovery, metadata, state, and DAG-resolved next-prompts."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "mcp>=1.0.0",
    "jsonschema>=4,<5",
]

[project.scripts]
workpack-mcp = "workpack_mcp.server:main"

[tool.hatch.build.targets.wheel]
packages = ["src/workpack_mcp"]

[tool.pytest.ini_options]
testpaths = ["tests"]
