name: Publish @workpack/protocol

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Only run npm pack --dry-run (skip publish)"
        required: true
        type: boolean
        default: true
      tag:
        description: "npm dist-tag (for example: latest, next)"
        required: false
        default: "latest"
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify package contents
        run: npm --prefix packages/protocol pack --dry-run

      - name: Publish package
        if: ${{ !inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm --prefix packages/protocol publish --access public --tag "${{ inputs.tag }}"
